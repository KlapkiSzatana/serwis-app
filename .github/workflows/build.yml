name: Build & Release Serwis App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: SerwisApp_Setup.exe
          - os: macos-14
            artifact_name: SerwisApp_macos.dmg
          - os: ubuntu-22.04
            artifact_name: SerwisApp_linux.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dla Linuksa instalujemy niezbędne biblioteki systemowe (wymagane m.in. dla Qt6/PySide6)
      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1-mesa-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libdbus-1-3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 cryptography pillow requests python-barcode packaging pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # 1. Budowanie Windows - tryb Standalone (katalog plików)
            python -m PyInstaller --noconfirm --windowed \
              --add-data "serwisapp.png;." \
              --add-data "icon.png;." \
              --add-data "actions;actions" \
              --add-data "fonts;fonts" \
              --add-data "modules;modules" \
              --add-data "setup;setup" \
              --add-data "ui;ui" \
              --add-data "resources;resources" \
              --version-file "file_version_info.txt" \
              --icon "icon.ico" \
              --name "serwis-app" \
              serwis-app.py

            # 2. Tworzenie instalatora za pomocą Inno Setup
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

            # 3. Czyszczenie katalogów dla Windows
            mkdir -p dist
            mv user_setup/SerwisApp_Setup.exe dist/SerwisApp_Setup.exe
            rm -rf dist/serwis-app/
            rm -f dist/serwis-app.exe
            rm -f dist/serwis-app-windows.exe

          elif [ "${{ matrix.os }}" == "macos-14" ]; then
            # 4. Dla macOS - budowanie w trybie --onedir i spakowanie do DMG
            python -m PyInstaller --noconfirm --onedir --windowed \
              --add-data "serwisapp.png:." \
              --add-data "icon.png:." \
              --add-data "serwisapp.icns:." \
              --add-data "actions:actions" \
              --add-data "fonts:fonts" \
              --add-data "modules:modules" \
              --add-data "setup:setup" \
              --add-data "ui:ui" \
              --add-data "resources:resources" \
              --osx-bundle-identifier "com.klapkiszatana.serwis-app" \
              --icon "serwisapp.icns" \
              --name "SerwisApp" \
              serwis-app.py

            # 5. Pakowanie folderu aplikacji do formatu .dmg
            hdiutil create -volname "SerwisApp" -srcfolder dist/SerwisApp.app -ov -format UDZO dist/SerwisApp_macos.dmg

          elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            # 6. Dla Linux - budowanie w trybie --onedir (tworzy katalog SerwisApp z binarką i zależnościami)
            python -m PyInstaller --noconfirm --onedir --windowed \
              --add-data "serwisapp.png:." \
              --add-data "icon.png:." \
              --add-data "actions:actions" \
              --add-data "fonts:fonts" \
              --add-data "modules:modules" \
              --add-data "setup:setup" \
              --add-data "ui:ui" \
              --add-data "resources:resources" \
              --name "SerwisApp" \
              serwis-app.py

            # USUWANIE PROBLEMATYCZNYCH BIBLIOTEK SYSTEMOWYCH
            # 1. Usuwamy readline (rozwiązuje błąd rl_trim_arg_from_keyseq w /bin/sh)
            rm -f dist/SerwisApp/_internal/libreadline.so*

            # 2. Usuwamy standardowe biblioteki C/C++ (rozwiązuje błąd GLIBCXX w kde-open/xdg-open)
            rm -f dist/SerwisApp/_internal/libstdc++.so*
            rm -f dist/SerwisApp/_internal/libgcc_s.so*

            mkdir -p linux-package

            cp -r dist/SerwisApp linux-package/
            cp serwisapp.png linux-package/
            cp install.run linux-package/
            cp uninstall.run linux-package/

            chmod +x linux-package/install.run
            chmod +x linux-package/uninstall.run

            # Bezpieczny zapis pliku .desktop (wzorowany na PKGBUILD, bez błędów parsera macOS)
            echo "[Desktop Entry]" > linux-package/SerwisApp.desktop
            echo "Name=ServiceApp" >> linux-package/SerwisApp.desktop
            echo "Name[pl]=SerwisApp" >> linux-package/SerwisApp.desktop
            echo "Comment=Simple Service Management" >> linux-package/SerwisApp.desktop
            echo "Comment[pl]=Proste Prowadzenie Serwisu" >> linux-package/SerwisApp.desktop
            echo "Exec=/opt/SerwisApp/SerwisApp/SerwisApp" >> linux-package/SerwisApp.desktop
            echo "Icon=/opt/SerwisApp/serwisapp.png" >> linux-package/SerwisApp.desktop
            echo "Terminal=false" >> linux-package/SerwisApp.desktop
            echo "Type=Application" >> linux-package/SerwisApp.desktop
            echo "Categories=Office;Utility;" >> linux-package/SerwisApp.desktop
            echo "StartupWMClass=SerwisApp" >> linux-package/SerwisApp.desktop
            echo "StartupNotify=true" >> linux-package/SerwisApp.desktop


            chmod +x linux-package/SerwisApp.desktop


            # Pakujemy cały folder linux-package do wymaganego archiwum

            tar -czf dist/SerwisApp_linux.tar.gz linux-package
          fi

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SerwisApp_Setup.exe
            dist/SerwisApp_macos.dmg
            dist/SerwisApp_linux.tar.gz
          body: |
            ## Zmiany w tej wersji:
            - W belce tytułowej powielona nazwa aplikacji - usunięto.
