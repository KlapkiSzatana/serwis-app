name: Build & Release Serwis App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: SerwisApp_Setup.exe
          - os: macos-14
            artifact_name: SerwisApp_macos.dmg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            certifi==2026.1.4 \
            cffi==2.0.0 \
            charset-normalizer==3.4.4 \
            cryptography==46.0.3 \
            idna==3.11 \
            pillow==12.1.0 \
            pycparser==2.23 \
            PySide6==6.10.1 \
            PySide6_Addons==6.10.1 \
            PySide6_Essentials==6.10.1 \
            python-barcode==0.16.1 \
            requests==2.32.5 \
            shiboken6==6.10.1 \
            urllib3==2.6.3 \
            pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # 1. Budowanie Windows - tryb Standalone (katalog plików)
            python -m PyInstaller --noconfirm --windowed \
              --add-data "serwisapp.png;." \
              --add-data "icon.png;." \
              --add-data "actions;actions" \
              --add-data "fonts;fonts" \
              --add-data "modules;modules" \
              --add-data "setup;setup" \
              --add-data "ui;ui" \
              --add-data "resources;resources" \
              --version-file "file_version_info.txt" \
              --icon "icon.ico" \
              --name "serwis-app" \
              serwis-app.py

            # 2. Tworzenie instalatora za pomocą Inno Setup
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

            # 3. Czyszczenie katalogów dla Windows
            mkdir -p dist
            mv user_setup/SerwisApp_Setup.exe dist/SerwisApp_Setup.exe
            rm -rf dist/serwis-app/
            rm -f dist/serwis-app.exe
            rm -f dist/serwis-app-windows.exe
          else
            # 4. Dla macOS - budowanie w trybie --onedir i spakowanie do DMG
            python -m PyInstaller --noconfirm --onedir --windowed \
              --add-data "serwisapp.png:." \
              --add-data "icon.png:." \
              --add-data "serwisapp.icns:." \
              --add-data "actions:actions" \
              --add-data "fonts:fonts" \
              --add-data "modules:modules" \
              --add-data "setup:setup" \
              --add-data "ui:ui" \
              --add-data "resources:resources" \
              --osx-bundle-identifier "com.klapkiszatana.serwis-app" \
              --icon "serwisapp.icns" \
              --name "SerwisApp" \
              serwis-app.py

            # 5. Pakowanie folderu aplikacji do formatu .dmg
            hdiutil create -volname "SerwisApp" -srcfolder dist/SerwisApp.app -ov -format UDZO dist/SerwisApp_macos.dmg
          fi

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SerwisApp_Setup.exe
            dist/SerwisApp_macos.dmg
          body: |
            ## Zmiany w tej wersji:
            - Wdrożono instalator w katalogu użytkownika z pełnym deinstalatorem dla Windowsa.
            - Aplikacja działa w trybie standalone dla szybszego uruchamiania.
            - Spakowano wszystkie wymagane zasoby i moduły.
            - Dla systemu macOS aplikacja została spakowana do instalatora w formacie DMG (SerwisApp_macos.dmg) z wykorzystaniem ikony w formacie .icns.
